career-profile:
    title: Career Profile
    summary: | 
      Professional developer for at least 5 years. Passionate about programming and systems development and always looking for knowledge and innovation. Greater experience in software development in the financial sector (Credit Services and Fintechs) and some brief knowledge in the healthcare sector. In addition to experience with development itself, I have also taught courses and classes in various segments of Information Technology.
      I am proficient in the Object Orientation paradigm, mainly using Java and the Spring framework. Solid knowledge of application and API development using both monolithic architecture and microservices (SOA). Familiar with relational and non-relational databases, such as Oracle SQL, MySQL, Postgres and MongoDB. And recently I’m deepening in learning and creating Full Cicle applications and learning the
      basics of deploying with Continuous Integration (CI) and Continuous Development (CD) and also integration with Amazon Web Services (AWS) features. I ventured out for a year in the area of Quality Assurance, focusing on end-to-end testing automation, using Javascript frameworks and writing tests in Typescript. I’ve entered in this field by virtue of my prior programming knowledge and coding skills. But after this experience, I realized that my best skills are at the backend applications development, always carrying my passion for the field and also trying to be better and better at what I do.

