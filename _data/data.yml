career-profile:
    title: Career Profile
    summary: |
      I am a deep lover of technology and system development. I started my career as a developer intern and, from that moment, I was highlighted especially by my ease of learning, quick perception of failures and efficient solutions, always respecting a good coding pratice.
      I had tried working with Software Quality Assurance for 1 year and it was a pretty good challenge big for me, because I could learn a lot! But it wasn’t my passion. The fields I know and love to work with are the financial and credit companies, bank transactions and fintechs. And I’m currently working with all of this.
      I have solid knowledge in Java, specially developing with Spring framework. Very active in the use of agile methodologies, especially Scrum. Nowdays, I'm studying and deveveloping SaaS applications in my current work, with AWS tools.
      Natural from Brazil, I have a personal dream to take my knowledge and skills to whole world! 
